<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚬 🚬 🚬</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #313131; /* 相機無法啟動時的備用背景色 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 攝影機背景層，放在最底層 */
        #camera-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100svh; /* 改用 svh 避免行動端工具列推擠 */
            object-fit: cover;
            z-index: 1;
        }

        /* 煙霧畫布，鋪滿全螢幕且不干擾點擊 */
        #smoke-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100svh;
            pointer-events: none;
            z-index: 10;
        }

        #scene {
            position: relative;
            height: 80svh; /* 確保主體維持在安全可視範圍內 */
            display: inline-block;
            z-index: 5;
        }

        #cig-full {
            display: block;
            height: 100%; 
            width: auto;  
            z-index: 2;
            clip-path: inset(0% 0 0 0);
            transition: opacity 3s;
        }

        #cig-ash {
            position: absolute;
            z-index: 3;
            width: 100%; 
            height: auto;
            left: 0;
            top: 0; 
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 1s;
        }

        #cig-butt {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%; 
            height: auto;
            z-index: 1;
            opacity: 0;
            transition: opacity 3s;
        }

        /* 初始狀態的等待畫面層 */
        #lighter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100svh;
            background-color: rgba(0, 0, 0, 0.31); /* 保持 31% 透明度的黑色 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.8s ease;
        }

        /* 簡約白底圓框按鈕設計 */
        #start-btn {
            background-color: #ffffff;
            color: #0000ff;
            border: none;
            border-radius: 50px;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, background-color 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
            background-color: #e0e0e0;
        }

    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline muted></video>

    <canvas id="smoke-canvas"></canvas>

    <div id="scene">
        <img src="003.png" id="cig-butt" alt="butt">
        <img src="001.png" id="cig-full" alt="cigarette">
        <img src="002.png" id="cig-ash" alt="ash">
    </div>

    <div id="lighter-overlay">
        <button id="start-btn">120 секунд</button>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const videoBg = document.getElementById('camera-bg');
        const startBtn = document.getElementById('start-btn');
        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');
        const lighterOverlay = document.getElementById('lighter-overlay');
        const cigFull = document.getElementById('cig-full');
        const cigAsh = document.getElementById('cig-ash');
        const cigButt = document.getElementById('cig-butt');

        const DURATION = 120 * 1000; 
        
        let burnStartPercent = 0;
        let burnEndPercent = 75; 
        
        let isBurning = false;
        let startTime = null;
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', () => {
            // 視窗縮放時先解鎖寬度，讓佈局重新計算後再重新鎖定
            scene.style.width = 'auto';
            resizeCanvas();
            // 給予瀏覽器微小的時間差重新渲染，再計算鎖定邊界
            setTimeout(calculateBurnRange, 50);
        });
        resizeCanvas();

        function calculateBurnRange() {
            const fullNaturalH = cigFull.naturalHeight;
            const fullNaturalW = cigFull.naturalWidth;
            const ashNaturalH = cigAsh.naturalHeight;
            const ashNaturalW = cigAsh.naturalWidth;

            if (fullNaturalH > 0 && fullNaturalW > 0) {
                // 【核心修復 1】將香菸容器鎖定為絕對像素寬度，徹底根除 Chrome 閒置時的動態寬度像素位移偏移
                const currentHeight = cigFull.offsetHeight;
                if (currentHeight > 0) {
                    const computedWidth = (fullNaturalW / fullNaturalH) * currentHeight;
                    scene.style.width = `${computedWidth}px`;
                }

                // 【核心修復 2】改為 400 停止點
                burnEndPercent = ((fullNaturalH - 400) / fullNaturalH) * 100;

                // 【核心修復 3】純數學幾何公式計算起始點，完全排除 DOM 未渲染完成時量到 0 或大尺寸的問題
                if (ashNaturalH > 0 && ashNaturalW > 0) {
                    const ashAspect = ashNaturalH / ashNaturalW;
                    const fullAspect = fullNaturalH / fullNaturalW;
                    burnStartPercent = (ashAspect / fullAspect) * 50;
                }
            }
        }

        // 確保不論是快取還是初次載入，都精確計算
        window.addEventListener('load', calculateBurnRange);
        if (cigFull.complete && cigAsh.complete) {
            calculateBurnRange();
        }

        startBtn.addEventListener('click', async () => {
            if (isBurning) return;

            startBtn.innerText = "Доступ к камере...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                
                videoBg.srcObject = stream;
                
                await new Promise(resolve => {
                    videoBg.onloadedmetadata = () => {
                        videoBg.play();
                        resolve();
                    };
                });
            } catch (err) {
                console.error("相機存取失敗或遭拒絕:", err);
            }
            
            // 啟動前強制重新鎖定與核對一次幾何參數
            calculateBurnRange();
            
            lighterOverlay.style.opacity = '0';
            lighterOverlay.style.pointerEvents = 'none';
            cigAsh.style.opacity = '1';
            
            isBurning = true;
            startTime = performance.now();
            requestAnimationFrame(animateSystem);
        });

        function animateSystem(currentTime) {
            if (!isBurning) return;

            const elapsedTime = currentTime - startTime;
            let progress = elapsedTime / DURATION;
            
            if (progress >= 1) {
                progress = 1;
                isBurning = false;
                cigButt.style.opacity = '1';
                cigAsh.style.opacity = '0';
                cigFull.style.opacity = '0';
            }

            const currentBurnPercent = burnStartPercent + (burnEndPercent - burnStartPercent) * progress;

            cigFull.style.clipPath = `inset(${currentBurnPercent}% 0 0 0)`;
            cigAsh.style.top = `${currentBurnPercent}%`;

            const ashRect = cigAsh.getBoundingClientRect();
            const emitX = ashRect.left + ashRect.width / 2;
            const emitY = ashRect.top + ashRect.height / 2;

            updateAndDrawSmoke(emitX, emitY, currentTime);

            if (isBurning) {
                requestAnimationFrame(animateSystem);
            } else {
                requestAnimationFrame(flushSmoke);
            }
        }

        function flushSmoke(currentTime) {
            updateAndDrawSmoke(-1000, -1000, currentTime, false);
            if (particles.length > 0) {
                requestAnimationFrame(flushSmoke);
            }
        }

        function updateAndDrawSmoke(emitX, emitY, time, emitting = true) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const breath = Math.sin(time / 3000); 
            const isThick = breath > 0.7;
            let particlesToSpawn = isThick ? 3 : (breath > 0 ? 1 : 0.3);

            if (emitting) {
                if (particlesToSpawn < 1) {
                    if (Math.random() < particlesToSpawn) spawnParticle(emitX, emitY);
                } else {
                    for (let i = 0; i < particlesToSpawn; i++) spawnParticle(emitX, emitY);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life++;
                p.y -= p.vy;
                p.x += Math.sin(p.life * 0.02 + p.seed) * 1.5 + p.vx;
                p.radius += 0.2;

                let opacity = 0;
                if (p.life < 50) opacity = p.life / 50;
                else if (p.life < p.maxLife - 100) opacity = 1;
                else opacity = Math.max(0, (p.maxLife - p.life) / 100);
                
                opacity *= p.baseAlpha;

                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                gradient.addColorStop(0, `rgba(240, 240, 245, ${opacity * 0.6})`);
                gradient.addColorStop(0.5, `rgba(220, 220, 230, ${opacity * 0.3})`);
                gradient.addColorStop(1, `rgba(220, 220, 230, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                if (p.life >= p.maxLife) particles.splice(i, 1);
            }
        }

        function spawnParticle(x, y) {
            particles.push({
                x: x + (Math.random() * 10 - 5),
                y: y,
                vx: (Math.random() - 0.5) * 0.5,
                vy: Math.random() * 1.5 + 1.5,
                radius: Math.random() * 10 + 10,
                life: 0,
                maxLife: Math.random() * 200 + 300,
                seed: Math.random() * 100,
                baseAlpha: Math.random() * 0.4 + 0.1
            });
        }
    </script>
</body>
</html>
