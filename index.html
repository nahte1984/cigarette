<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚬12O🚬</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #313131;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        #smoke-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }

        /* 讓場景高度鎖定 80vh，寬度由內部的 001.png 自然撐開 */
        #scene {
            position: relative;
            height: 80vh;
            display: inline-block; /* 緊緊包覆內容物 */
        }

        /* 完好的香菸 (01) 作為排版與寬度的絕對基準 */
        #cig-full {
            display: block;
            height: 100%; /* 高度吃滿 80vh */
            width: auto;  /* 寬度按比例自然縮放 */
            z-index: 2;
            clip-path: inset(0% 0 0 0);
            transition: opacity 3s;
        }

        /* 燃燒的煙頭 (02) */
        #cig-ash {
            position: absolute;
            z-index: 3;
            /* 寬度強制跟隨 cig-full 撐開的容器寬度，保證邊緣完美貼合 */
            width: 100%; 
            height: auto;
            left: 0;
            top: 0; 
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 1s;
        }

        /* 燒完的煙蒂 (03) */
        #cig-butt {
            position: absolute;
            bottom: 0; /* 完美貼齊底部 */
            left: 0;
            width: 100%; /* 寬度同樣跟隨基準 */
            height: auto;
            z-index: 1;
            opacity: 0;
            transition: opacity 3s;
        }

        /* 初始狀態的黑色透明區隔層 */
        #lighter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.31);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #lighter-btn {
            height: 35vh; 
        }

    </style>
</head>
<body>

    <canvas id="smoke-canvas"></canvas>

    <div id="scene">
        <img src="003.png" id="cig-butt" alt="butt">
        <img src="001.png" id="cig-full" alt="cigarette">
        <img src="002.png" id="cig-ash" alt="ash">
    </div>

    <div id="lighter-overlay">
        <img src="004.png" id="lighter-btn" alt="Start Lighter">
    </div>

    <script>
        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');
        const lighterOverlay = document.getElementById('lighter-overlay');
        const cigFull = document.getElementById('cig-full');
        const cigAsh = document.getElementById('cig-ash');
        const cigButt = document.getElementById('cig-butt');

        const DURATION = 120 * 1000; 
        
        let burnStartPercent = 0;
        let burnEndPercent = 75; 
        
        let isBurning = false;
        let startTime = null;
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function calculateBurnRange() {
            const naturalH = cigFull.naturalHeight;
            if (naturalH > 0) {
                // 精確計算 331px 的停止點
                burnEndPercent = ((naturalH - 331) / naturalH) * 100;
            }
        }

        if (cigFull.complete) {
            calculateBurnRange();
        } else {
            cigFull.onload = calculateBurnRange;
        }

        lighterOverlay.addEventListener('click', () => {
            if (isBurning) return;
            
            lighterOverlay.style.opacity = '0';
            lighterOverlay.style.pointerEvents = 'none';
            cigAsh.style.opacity = '1';
            
            isBurning = true;
            startTime = performance.now();
            requestAnimationFrame(animateSystem);
        });

        function animateSystem(currentTime) {
            if (!isBurning) return;

            const elapsedTime = currentTime - startTime;
            let progress = elapsedTime / DURATION;
            
            if (progress >= 1) {
                progress = 1;
                isBurning = false;
                cigButt.style.opacity = '1';
                cigAsh.style.opacity = '0';
                cigFull.style.opacity = '0';
            }

            const currentBurnPercent = burnStartPercent + (burnEndPercent - burnStartPercent) * progress;

            cigFull.style.clipPath = `inset(${currentBurnPercent}% 0 0 0)`;
            cigAsh.style.top = `${currentBurnPercent}%`;

            const ashRect = cigAsh.getBoundingClientRect();
            const emitX = ashRect.left + ashRect.width / 2;
            const emitY = ashRect.top + ashRect.height / 2;

            updateAndDrawSmoke(emitX, emitY, currentTime);

            if (isBurning) {
                requestAnimationFrame(animateSystem);
            } else {
                requestAnimationFrame(flushSmoke);
            }
        }

        function flushSmoke(currentTime) {
            updateAndDrawSmoke(-1000, -1000, currentTime, false);
            if (particles.length > 0) {
                requestAnimationFrame(flushSmoke);
            }
        }

        function updateAndDrawSmoke(emitX, emitY, time, emitting = true) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const breath = Math.sin(time / 3000); 
            const isThick = breath > 0.7;
            let particlesToSpawn = isThick ? 3 : (breath > 0 ? 1 : 0.3);

            if (emitting) {
                if (particlesToSpawn < 1) {
                    if (Math.random() < particlesToSpawn) spawnParticle(emitX, emitY);
                } else {
                    for (let i = 0; i < particlesToSpawn; i++) spawnParticle(emitX, emitY);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life++;
                p.y -= p.vy;
                p.x += Math.sin(p.life * 0.02 + p.seed) * 1.5 + p.vx;
                p.radius += 0.2;

                let opacity = 0;
                if (p.life < 50) opacity = p.life / 50;
                else if (p.life < p.maxLife - 100) opacity = 1;
                else opacity = Math.max(0, (p.maxLife - p.life) / 100);
                
                opacity *= p.baseAlpha;

                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                gradient.addColorStop(0, `rgba(220, 220, 225, ${opacity * 0.5})`);
                gradient.addColorStop(0.5, `rgba(200, 200, 205, ${opacity * 0.2})`);
                gradient.addColorStop(1, `rgba(200, 200, 205, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                if (p.life >= p.maxLife) particles.splice(i, 1);
            }
        }

        function spawnParticle(x, y) {
            particles.push({
                x: x + (Math.random() * 10 - 5),
                y: y,
                vx: (Math.random() - 0.5) * 0.5,
                vy: Math.random() * 1.5 + 1.5,
                radius: Math.random() * 10 + 10,
                life: 0,
                maxLife: Math.random() * 200 + 300,
                seed: Math.random() * 100,
                baseAlpha: Math.random() * 0.4 + 0.1
            });
        }
    </script>
</body>
</html>
